<main>
  <h1>Snip</h1>

  <section class="shorten">
    <h2>Shorten a URL</h2>
    <form (submit)="onSubmit($event)">
      <input
        type="url"
        placeholder="https://example.com"
        [value]="urlInput()"
        (input)="onInput($event)"
        [disabled]="submitting()"
        class="url-input"
      />
      <button type="submit" [disabled]="submitting()">
        {{ submitting() ? 'Shortening...' : 'Shorten' }}
      </button>
    </form>
    @if (error()) {
      <p class="error">{{ error() }}</p>
    }
    @if (newLink(); as link) {
      <div class="result">
        Short link: <a [href]="link.shortUrl" target="_blank" rel="noopener">{{ link.shortUrl }}</a>
      </div>
    }
  </section>

  <section class="links">
    <h2>All links</h2>
    @if (links().length === 0) {
      <p class="empty">No links yet.</p>
    } @else {
      <table>
        <thead>
          <tr>
            <th>Code</th>
            <th>Original URL</th>
            <th>Hits</th>
          </tr>
        </thead>
        <tbody>
          @for (link of links(); track link.code) {
            <tr>
              <td><a [href]="link.shortUrl" target="_blank" rel="noopener">{{ link.code }}</a></td>
              <td class="orig-url">{{ link.url }}</td>
              <td>{{ link.hits }}</td>
            </tr>
          }
        </tbody>
      </table>
    }
  </section>
</main>
